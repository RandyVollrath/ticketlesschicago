name: Build & Submit Android

on:
  push:
    tags:
      - 'v*'

jobs:
  android:
    name: Android Build & Submit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: TicketlessChicagoMobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: TicketlessChicagoMobile/package-lock.json
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - run: npm ci
      - name: Write Google Play service account key
        run: mkdir -p credentials && echo '${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_KEY_BASE64 }}' | base64 -d > credentials/play-store-key.json
      - name: Build and submit
        run: eas build --platform android --profile production --auto-submit --non-interactive
