name: Build & Submit to App Stores

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-submit:
    name: EAS Build & Submit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: TicketlessChicagoMobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: TicketlessChicagoMobile/package-lock.json

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build Android
        run: eas build --platform android --profile production --non-interactive

      - name: Build and submit iOS
        run: eas build --platform ios --profile production --auto-submit --non-interactive
        env:
          EXPO_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.EXPO_APPLE_APP_SPECIFIC_PASSWORD }}
