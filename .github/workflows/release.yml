name: Build & Submit to App Stores

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-submit:
    name: EAS Build & Submit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: TicketlessChicagoMobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: TicketlessChicagoMobile/package-lock.json

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Write Google Play service account key
        run: mkdir -p credentials && echo '${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_KEY_BASE64 }}' | base64 -d > credentials/play-store-key.json

      - name: Build and submit Android
        run: eas build --platform android --profile production --auto-submit --non-interactive

      - name: Build iOS
        id: ios-build
        run: |
          OUTPUT=$(eas build --platform ios --profile production --non-interactive --json 2>&1 | tail -1)
          BUILD_ID=$(echo "$OUTPUT" | python3 -c "import sys,json; print(json.load(sys.stdin)[0]['id'])")
          echo "build_id=$BUILD_ID" >> "$GITHUB_OUTPUT"

      - name: Submit iOS to App Store
        run: eas submit --platform ios --id ${{ steps.ios-build.outputs.build_id }} --non-interactive
